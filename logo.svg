<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#141a16"/>
      <stop offset="1" stop-color="#0a0f0c"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#39ff8b"/>
      <stop offset="1" stop-color="#00cc55"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- badge -->
  <rect x="32" y="32" width="448" height="448" rx="104" fill="url(#bg)" stroke="url(#neon)" stroke-width="8"/>

  <!-- ninja hood -->
  <path d="M256 120
           c-92 0 -150 52 -150 132
           c0 18 4 30 12 40
           l30 -34
           c34 18 70 26 108 26
           s74 -8 108 -26
           l30 34
           c8 -10 12 -22 12 -40
           c0 -80 -58 -132 -150 -132 Z"
        fill="#1b231e" stroke="url(#neon)" stroke-width="6"/>

  <!-- mask band -->
  <rect x="118" y="250" width="276" height="58" rx="14" fill="#10160f"/>

  <!-- eyes -->
  <g filter="url(#glow)">
    <path d="M150 278 l78 -16 l0 32 l-78 6 Z" fill="url(#neon)"/>
    <path d="M362 278 l-78 -16 l0 32 l78 6 Z" fill="url(#neon)"/>
  </g>

  <!-- crossed blades -->
  <g stroke="url(#neon)" stroke-width="10" stroke-linecap="round" opacity="0.9">
    <line x1="170" y1="372" x2="342" y2="408"/>
    <line x1="342" y1="372" x2="170" y2="408"/>
  </g>
</svg>
